# Render Blueprint — native Node (no Docker).
# After push: Render Dashboard → New Blueprint → connect repo, or attach this file to an existing project.
# Set secrets in the dashboard: MONGODB_URI, GEMINI_API_KEY, REDIS_URL, SESSION_SECRET, GitHub OAuth vars, etc.

services:
  - type: web
    name: ace-backend
    runtime: node
    # region: oregon        # optional — set in dashboard if you prefer
    # plan: free            # optional — pick in dashboard (free tier may sleep when idle)
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKER_EMBEDDED
        value: "true"
      - key: LOG_LEVEL
        value: info
      # Required: add MONGODB_URI (and others) under Environment in the Render UI, or use sync: false entries here.
